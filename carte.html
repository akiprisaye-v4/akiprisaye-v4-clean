<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carte des magasins – A KI PRI SA YÉ</title>

    <!-- STYLE GLOBAL -->
    <style>
        body {
            margin: 0;
            background: #0d0d0d;
            color: white;
            font-family: Arial, sans-serif;
        }
        .page-title {
            text-align: center;
            padding: 20px 10px;
            color: #3f7fff;
            font-size: 26px;
            font-weight: bold;
        }
        .selector-container {
            padding: 10px;
            text-align: center;
        }
        select {
            width: 90%;
            max-width: 500px;
            padding: 12px;
            font-size: 18px;
            background: #111;
            color: white;
            border: 2px solid #3f7fff;
            border-radius: 12px;
        }
        #map {
            width: 100%;
            height: calc(100vh - 160px);
            border-radius: 0;
        }
    </style>

    <!-- GOOGLE MAPS API -->
    <script async
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAs0uisnGSK7OIrFqQPFYF6E-ctNOPY0Sw">
    </script>

    <!-- SCRIPTS DU PROJET -->
    <script type="module">
        import { TERRITORIES } from "./scripts/territories.js";
        import { getStoresByTerritory } from "./scripts/magasins-firestore.js";

        let map = null;
        let markers = [];

        // -----------------------------
        // Création de la carte Google
        // -----------------------------
        function initMap(lat = 14.6, lon = -53.0, zoom = 3) {
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat, lng: lon },
                zoom,
                mapTypeId: "roadmap",
                disableDefaultUI: false
            });
        }

        // -----------------------------
        // Charger un territoire + magasins
        // -----------------------------
        async function loadTerritory(territoryId) {
            const t = TERRITORIES.find(x => x.id === territoryId);
            if (!t) return;

            initMap(t.center.lat, t.center.lon, t.zoom);

            // Nettoyage des anciens marqueurs
            markers.forEach(m => m.setMap(null));
            markers = [];

            // Charger Firestore
            const shops = await getStoresByTerritory(territoryId);

            shops.forEach(shop => {
                if (!shop.lat || !shop.lon) return;

                const marker = new google.maps.Marker({
                    position: { lat: shop.lat, lng: shop.lon },
                    map: map,
                    title: shop.name
                });

                const popup = `
                    <div style="font-size:15px; color:black;">
                        <strong>${shop.name}</strong><br>
                        ${shop.address}<br>
                        <em>${shop.chain || ""}</em><br><br>

                        <button onclick="openGPS(${shop.lat}, ${shop.lon})"
                            style="background:#1e90ff;color:white;padding:6px 10px;border:none;border-radius:6px;">
                            📍 Ouvrir dans GPS
                        </button>
                        <br><br>
                        <button onclick="suggestPromotions('${territoryId}')"
                            style="background:#ff5722;color:white;padding:6px 10px;border:none;border-radius:6px;">
                            🔥 Promotions sur le trajet
                        </button>
                    </div>
                `;

                const infowindow = new google.maps.InfoWindow({
                    content: popup
                });

                marker.addListener("click", () => infowindow.open(map, marker));
                markers.push(marker);
            });
        }

        // GPS externe (Google Maps App ou navigateur)
        window.openGPS = function(lat, lon) {
            window.open(`https://maps.google.com/?q=${lat},${lon}`, "_blank");
        };

        // IA – suggestions promotions
        window.suggestPromotions = function(territoryId) {
            alert("🧠 Analyse IA du trajet en cours… Promotions bientôt intégrées.");
        };

        // Au chargement
        window.onload = () => {
            initMap(); // vue globale

            const select = document.getElementById("territorySelect");
            select.innerHTML = TERRITORIES.map(t =>
                `<option value="${t.id}">${t.flag} ${t.name}</option>`
            ).join("");

            select.addEventListener("change", () => {
                if (select.value !== "all") loadTerritory(select.value);
                else initMap(); // vue globale
            });
        };
    </script>

</head>

<body>

    <div class="page-title">🗺️ Carte interactive des magasins</div>

    <div class="selector-container">
        <select id="territorySelect">
            <option>Chargement…</option>
        </select>
    </div>

    <div id="map"></div>

</body>
</html>
