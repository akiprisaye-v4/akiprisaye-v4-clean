<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carte des magasins – A KI PRI SA YÉ</title>

    <style>
        body {
            margin: 0;
            background: #0d0d0d;
            color: white;
            font-family: Arial, sans-serif;
        }
        .page-title {
            text-align: center;
            padding: 20px;
            color: #4da3ff;
            font-size: 26px;
            font-weight: bold;
        }
        .selector-container {
            padding: 10px;
            text-align: center;
        }
        select {
            width: 90%;
            padding: 12px;
            font-size: 18px;
            background: #111;
            color: white;
            border: 2px solid #4da3ff;
            border-radius: 12px;
        }
        #map {
            width: 100%;
            height: calc(100vh - 160px);
        }
    </style>

    <script async
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAs0uisnGSK7OIrFqQPFYF6E-ctNOPY0Sw">
    </script>

    <script type="module" src="./scripts/load-map.js"></script>
</head>

<body>

    <div class="page-title">🗺️ Carte interactive des magasins</div>

    <div class="selector-container">
        <select id="territorySelect"></select>
    </div>

    <div id="map"></div>

</body>
</html>
