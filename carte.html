<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Carte | A KI PRI SA YÉ</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0d1117;
      color: white;
      font-family: Arial, sans-serif;
    }

    #map {
      width: 100%;
      height: 75vh;
    }

    #controls {
      padding: 15px;
      background: #111827;
      border-bottom: 1px solid #333;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
      margin-right: 8px;
    }

    #promo-panel {
      padding: 20px;
      background: #0f172a;
      min-height: 200px;
      border-top: 1px solid #333;
    }
  </style>
</head>

<body>

  <div id="controls">
    <button onclick="locateUser()">📍 Me localiser</button>
    <button onclick="loadStoresForTerritory('guadeloupe')">🏬 Magasins Guadeloupe</button>
  </div>

  <div id="map"></div>

  <div id="promo-panel">
    <h3>🔥 Arrêts promos suggérés</h3>
    <p>Aucune recherche en cours…</p>
  </div>

  <!-- Scripts internes -->
  <script type="module" src="./scripts/load-map.js"></script>
  <script type="module" src="./scripts/territories.js"></script>

  <!-- Google Maps -->
  <script
    src="https://maps.googleapis.com/maps/api/js?key=TA_CLE_API_ICI&callback=initGoogleMap"
    async defer></script>

</body>
</html>
