<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte interactive des magasins</title>

    <!-- FEUILLES DE STYLE -->
    <link rel="stylesheet" href="assets/shared-nav.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

    <!-- FIX LEAFLET – IMPORTANT -->
    <style>
        #map {
            height: 480px !important;
            min-height: 480px !important;
            width: 100%;
            background: #0d0d0d;
            border-radius: 12px;
            margin-top: 10px;
        }

        @media (max-width: 600px) {
            #map {
                height: 420px !important;
                min-height: 420px !important;
            }
        }

        body {
            background: #0b0b0b;
            color: #fff;
            font-family: system-ui, sans-serif;
        }

        .container {
            padding: 15px;
        }
    </style>
</head>

<body>

    <!-- NAVIGATION -->
    <script type="module" src="assets/shared-nav.js"></script>

    <div class="container">
        <h1 style="font-size: 28px; text-align: center; margin-bottom: 20px;">
            🗺️ Carte interactive des magasins
        </h1>

        <!-- SELECT DES TERRITOIRES -->
        <select id="territory-select"
                style="width:100%; padding:14px; border-radius:10px; background:#111; color:white; font-size:18px;">
            <option value="guadeloupe">🇬🇵 Guadeloupe</option>
            <option value="martinique">🇲🇶 Martinique</option>
            <option value="guyane">🇬🇫 Guyane</option>
            <option value="reunion">🇷🇪 La Réunion</option>
            <option value="mayotte">🇾🇹 Mayotte</option>
        </select>

        <!-- CARTE -->
        <div id="map"></div>
    </div>

    <!-- LEAFLET JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- MODULES FIRESTORE + TERRITOIRES + MAP -->
    <script type="module">
        import { TERRITORIES } from "./scripts/territories.js";
        import { initMap } from "./scripts/map-init.js";
        import { loadStoresForTerritory } from "./scripts/load-map.js";

        console.log("Carte — démarrage…");

        const map = initMap();
        window.map = map; // utile pour invalidateSize

        const select = document.getElementById("territory-select");

        async function updateMap() {
            const t = select.value;
            console.log("Chargement territoire :", t);

            const coords = TERRITORIES[t];
            map.setView([coords.lat, coords.lon], coords.zoom);

            await loadStoresForTerritory(t, map);

            // FIX affichage : recalc Leaflet
            setTimeout(() => map.invalidateSize(), 350);
        }

        select.addEventListener("change", updateMap);

        updateMap(); // affichage initial
    </script>

</body>
</html>
