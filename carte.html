<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carte des magasins - A KI PRI SA YÉ</title>

    <!-- Style simple pour éviter les bugs -->
    <style>
        body { margin: 0; padding: 0; background: #0d0d0d; color: white; font-family: sans-serif; }
        #territorySelect {
            width: 90%;
            margin: 15px auto;
            padding: 12px;
            font-size: 18px;
            border-radius: 12px;
            background: #1a1a1a;
            color: white;
            border: 2px solid #333;
            display: block;
        }
        #map {
            width: 100%;
            height: 80vh;
            border-radius: 12px;
            margin: auto;
        }
    </style>

    <!-- Google Maps (clé API) -->
    <script src="https://maps.googleapis.com/maps/api/js?key=ALzaSyAs0uisnGSK7OIrFqQPFYF6E-ctNOPY0Sw&libraries=places"></script>

</head>
<body>

    <h2 style="text-align:center; margin-top:20px; font-size:28px;">
        🌍 Carte interactive des magasins
    </h2>

    <!-- Selecteur des territoires -->
    <select id="territorySelect">
        <option value="all">Tous les territoires</option>
        <option value="guadeloupe">🇬🇵 Guadeloupe</option>
        <option value="martinique">🇲🇶 Martinique</option>
        <option value="guyane">🇬🇫 Guyane</option>
        <option value="reunion">🇷🇪 La Réunion</option>
        <option value="mayotte">🇾🇹 Mayotte</option>
        <option value="saint-martin">🇫🇷 Saint-Martin</option>
        <option value="saint-barthelemy">🇫🇷 Saint-Barthélemy</option>
        <option value="saint-pierre-et-miquelon">🇵🇲 Saint-Pierre-et-Miquelon</option>
        <option value="wallis-et-futuna">🇼🇫 Wallis-et-Futuna</option>
        <option value="nouvelle-caledonie">🇳🇨 Nouvelle-Calédonie</option>
        <option value="polynesie-francaise">🇵🇫 Polynésie française</option>
        <option value="terres-australes">🇹🇫 Terres australes</option>
    </select>

    <!-- Carte -->
    <div id="map"></div>

    <!-- Scripts -->
    <script type="module" src="/scripts/load-map.js"></script>

</body>
</html>
