<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Ki Pri Sa Yé — Carte Interactive</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body {
            margin: 0;
            background: #0e0e0e;
            color: white;
            font-family: system-ui, sans-serif;
        }
        #page-header {
            padding: 15px;
            background: rgba(20,20,20,0.9);
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        select {
            width: 95%;
            padding: 12px;
            background: #222;
            border: 1px solid #555;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
        }
        #map {
            width: 100%;
            height: calc(100vh - 100px);
        }
    </style>
</head>

<body>

    <header id="page-header">
        <select id="territory-select">
            <option value="">— Choisir un territoire —</option>
        </select>
    </header>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Modules -->
    <script type="module">

        import { TERRITORIES } from "./scripts/territories.js";
        import { loadTerritory, initMap } from "./scripts/load-map.js";

        // Insert territories in the select dropdown
        const select = document.getElementById("territory-select");

        TERRITORIES.forEach(t => {
            const opt = document.createElement("option");
            opt.value = t.id;
            opt.textContent = `${t.flag} ${t.name}`;
            select.appendChild(opt);
        });

        // Initialize map once
        initMap();

        // When selecting a territory
        select.addEventListener("change", () => {
            const id = select.value;
            if (!id) return;
            loadTerritory(id);
        });

    </script>

</body>
</html>
