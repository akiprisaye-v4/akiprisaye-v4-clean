<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A KI PRI SA YÉ – Carte interactive</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link rel="stylesheet" href="./shared-nav.css" />
<link rel="stylesheet" href="./style.css" />

<style>
body {
    background-color: #0f172a;
    margin: 0;
    font-family: Inter, sans-serif;
    color: white;
}
#map {
    width: 100%;
    height: calc(100vh - 140px);
    border-radius: 12px;
}
.container {
    padding: 16px;
}
.select-box {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    background: #1e293b;
    border: 1px solid #334155;
    color: white;
    font-size: 18px;
}
.legend {
    background: #1e293b;
    padding: 14px;
    border-radius: 12px;
    margin-top: 12px;
}
</style>
</head>

<body>

<header class="mobile-header">
    <button class="mobile-menu-btn" onclick="toggleMenu()">☰</button>
    <h1 class="mobile-title">A KI PRI SA YÉ</h1>
</header>

<nav id="mobileMenu" class="mobile-nav hidden">
    <ul>
        <li><a href="/">🏠 Accueil</a></li>
        <li><a href="/comparateur.html">🔍 Comparateur</a></li>
        <li><a href="/scanner.html">📷 Scanner</a></li>
        <li><a href="/carte.html" aria-current="page">🗺️ Carte</a></li>
        <li><a href="/modules.html">🧩 Modules</a></li>
    </ul>
</nav>

<script>
function toggleMenu() {
    document.getElementById("mobileMenu").classList.toggle("hidden");
}
</script>

<div class="container">

<select id="territoire" class="select-box">
    <option value="guadeloupe">🇬🇵 Guadeloupe</option>
    <option value="martinique">🇲🇶 Martinique</option>
    <option value="guyane">🇬🇫 Guyane</option>
    <option value="reunion">🇷🇪 La Réunion</option>
    <option value="mayotte">🇾🇹 Mayotte</option>
</select>

<div id="map"></div>

<div class="legend">
    <h3 style="color:#3b82f6;">📍 Légende</h3>
    <p>🔵 Magasins Firestore</p>
    <p>📍 Cliquez sur un marqueur pour voir les détails</p>
</div>

</div>

<!-- Firestore -->
<script type="module">
import { loadMagasins } from "./scripts/magasins-firestore.js";

const territories = {
    guadeloupe: { lat: 16.265, lon: -61.55, zoom: 10 },
    martinique: { lat: 14.63, lon: -61.02, zoom: 10 },
    guyane:     { lat: 4.93, lon: -52.33, zoom: 7 },
    reunion:    { lat: -21.115, lon: 55.536, zoom: 10 },
    mayotte:    { lat: -12.823, lon: 45.166, zoom: 11 },
};

const map = L.map("map").setView([16.265, -61.55], 10);

L.tileLayer("https://tiles.stadiamaps.com/tiles/alidade_smooth_dark/{z}/{x}/{y}.png", {
    maxZoom: 20,
}).addTo(map);

let markersLayer = L.layerGroup().addTo(map);

async function updateMap(territory) {
    markersLayer.clearLayers();

    const data = await loadMagasins(territory);

    data.forEach(shop => {
        const marker = L.circleMarker([shop.lat, shop.lon], {
            radius: 8,
            fillColor: "#3b82f6",
            color: "#000",
            weight: 1,
            fillOpacity: 0.9
        }).addTo(markersLayer);

        marker.bindPopup(`
            <b>${shop.name}</b><br>
            ${shop.ville || ""}<br>
            ${shop.adresse || ""}<br>
            <small>${shop.horaires || ""}</small>
        `);
    });
}

// Listener territoire
document.getElementById("territoire").addEventListener("change", (e) => {
    const t = territories[e.target.value];
    map.setView([t.lat, t.lon], t.zoom);
    updateMap(e.target.value);
});

// Premier affichage
updateMap("guadeloupe");
</script>

</body>
</html>
