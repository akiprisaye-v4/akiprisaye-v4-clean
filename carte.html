<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carte interactive – A KI PRI SA YÉ</title>

    <!-- Leaflet -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>

    <style>
        body {
            margin: 0;
            background: #0d0f16;
            color: #fff;
            font-family: system-ui, sans-serif;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-size: 30px;
            color: #4d9cff;
            margin-bottom: 20px;
        }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: #1a1d29;
            color: white;
            border: 1px solid #2c3142;
            font-size: 16px;
            margin-bottom: 20px;
        }

        #map {
            width: 100%;
            height: 70vh;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.15);
        }
    </style>
</head>

<body>
<div class="container">
    <h1>🗺️ Carte interactive des magasins</h1>

    <select id="territory">
        <option value="guadeloupe">🇬🇵 Guadeloupe</option>
        <option value="martinique">🇲🇶 Martinique</option>
        <option value="guyane">🇬🇫 Guyane</option>
        <option value="reunion">🇷🇪 La Réunion</option>
        <option value="mayotte">🇾🇹 Mayotte</option>
        <option value="saint-martin">🇫🇷 Saint-Martin</option>
        <option value="saint-barthelemy">🇫🇷 Saint-Barthélemy</option>
        <option value="saint-pierre">🇫🇷 Saint-Pierre-et-Miquelon</option>
        <option value="futuna">🇼🇫 Wallis-et-Futuna</option>
        <option value="polynesie">🇵🇫 Polynésie française</option>
        <option value="caledonie">🇳🇨 Nouvelle-Calédonie</option>
    </select>

    <div id="map"></div>
</div>

<script>
    const territories = {
        guadeloupe:  { lat: 16.265, lon: -61.55, zoom: 10 },
        martinique:  { lat: 14.63, lon: -61.02, zoom: 10 },
        guyane:      { lat: 4.93,  lon: -52.33, zoom: 8 },
        reunion:     { lat: -21.115, lon: 55.536, zoom: 10 },
        mayotte:     { lat: -12.823, lon: 45.166, zoom: 11 },
        "saint-martin": { lat: 18.07, lon: -63.05, zoom: 12 },
        "saint-barthelemy": { lat: 17.9, lon: -62.85, zoom: 12 },
        "saint-pierre": { lat: 46.78, lon: -56.18, zoom: 11 },
        futuna: { lat: -14.3, lon: -178.1, zoom: 10 },
        polynesie: { lat: -17.679, lon: -149.406, zoom: 8 },
        caledonie: { lat: -22.2758, lon: 166.458, zoom: 9 }
    };

    const map = L.map('map').setView([16.265, -61.55], 10);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "© OpenStreetMap",
    }).addTo(map);

    document.getElementById("territory").addEventListener("change", (e) => {
        const t = territories[e.target.value];
        map.setView([t.lat, t.lon], t.zoom);
    });
</script>

</body>
</html>
