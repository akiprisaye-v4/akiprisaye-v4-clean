<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Ki Pri Sa Yé – Carte Google Maps</title>

    <link rel="stylesheet" href="styles.css" />

    <style>
        body {
            margin: 0;
            background: #0b0f19;
            color: white;
            font-family: Inter, sans-serif;
        }
        #map {
            height: 100vh;
            width: 100%;
        }
        #search-panel {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            z-index: 9999;
            background: rgba(0,0,0,0.55);
            padding: 12px;
            border-radius: 14px;
            backdrop-filter: blur(10px);
        }
        input, button {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 8px;
            border: none;
        }
        button {
            background: #1e90ff;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <!-- PANNEAU DE RECHERCHE -->
    <div id="search-panel">
        <input id="start" placeholder="Point de départ…" />
        <input id="end" placeholder="Destination…" />

        <button onclick="computeRoute()">Calculer l'itinéraire</button>
    </div>

    <!-- MAP -->
    <div id="map"></div>

    <!-- SCRIPTS -->
    <script type="module" src="./scripts/carte-google.js"></script>

    <!-- GOOGLE MAPS -->
    <script async
        src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&libraries=geometry">
    </script>

</body>
</html>
