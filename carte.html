<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Carte interactive des magasins Outre-mer – Guadeloupe, Martinique, Guyane, Réunion, Mayotte, Nouvelle-Calédonie.">
    <title>Carte interactive – A KI PRI SA YÉ</title>

    <link rel="stylesheet" href="styles/style.css">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>

    <!-- HEADER GLOBAL -->
    <header id="app-header"></header>

    <section class="page-title">
        <h1>🗺️ Carte interactive des magasins</h1>

        <div class="territory-selector">
            <select id="territoryFilter">
                <option value="all">Tous les territoires</option>
                <option value="guadeloupe">Guadeloupe</option>
                <option value="martinique">Martinique</option>
                <option value="guyane">Guyane</option>
                <option value="reunion">La Réunion</option>
                <option value="mayotte">Mayotte</option>
                <option value="nouvelle-caledonie">Nouvelle-Calédonie</option>
            </select>
        </div>
    </section>

    <!-- MAP ZONE -->
    <section class="map-container">
        <div id="map" class="map"></div>
        <div id="map-loader" class="loader">Chargement de la carte…</div>
    </section>

    <!-- FOOTER GLOBAL -->
    <footer id="app-footer"></footer>

    <!-- Scripts -->
    <script src="scripts/territories.js"></script>
    <script src="scripts/magasins-firestore.js"></script>
    <script src="scripts/load-map.js"></script>
    <script src="components/header.js"></script>
    <script src="components/footer.js"></script>

</body>
</html>
