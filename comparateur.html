<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Comparateur intelligent des prix Outre-mer – Trouvez les produits les moins chers en temps réel.">
    <title>Comparateur – A KI PRI SA YÉ</title>

    <link rel="stylesheet" href="styles/style.css">
</head>

<body>

    <!-- HEADER GLOBAL -->
    <header id="app-header"></header>

    <section class="page-title">
        <h1>📊 Comparateur des prix</h1>
        <p class="subtitle">Comparez les prix des produits en Outre-mer en un seul clic</p>
    </section>

    <!-- Barre de recherche -->
    <section class="search-section">
        <input id="searchInput" type="text" placeholder="Rechercher un produit… (ex : lait, riz, beurre)">
        <button id="refreshBtn" class="refresh-btn">🔄 Actualiser les prix</button>
    </section>

    <!-- Liste des résultats -->
    <section class="results-section">
        <div id="resultsList" class="results-list"></div>
    </section>

    <!-- FOOTER GLOBAL -->
    <footer id="app-footer"></footer>

    <!-- SCRIPTS -->
    <script src="scripts/comparateur-data.js"></script>
    <script src="scripts/comparateur.js"></script>
    <script src="components/header.js"></script>
    <script src="components/footer.js"></script>

</body>
</html>
