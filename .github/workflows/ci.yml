name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Validate frontend package-lock.json (must be valid JSON)
        working-directory: frontend
        run: node -e "JSON.parse(require('fs').readFileSync('package-lock.json','utf8')); console.log('package-lock.json OK')"

      - name: Diagnose environment
        working-directory: ${{ github.workspace }}
        run: |
          pwd
          node -v && npm -v
          ls -la
          ls -la frontend
          test -f frontend/package-lock.json && echo OK_LOCK || (echo MISSING_LOCK && exit 1)
          node -e "const p=require('./frontend/package-lock.json'); console.log('lockfileVersion', p.lockfileVersion);"
          sha256sum frontend/package-lock.json || shasum -a 256 frontend/package-lock.json

      - name: Clean npm cache
        working-directory: ${{ github.workspace }}
        run: |
          npm cache verify || true
          npm cache clean --force || true

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Build
        working-directory: frontend
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build

      - name: Typecheck
        working-directory: frontend
        run: npx tsc -p tsconfig.ci.json --noEmit
