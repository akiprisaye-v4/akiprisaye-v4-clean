name: Revenue OS

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: read

jobs:
  build-revenue-os:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Run Revenue OS export script
        run: node scripts/build-revenue-priority.mjs

      - name: Validate outputs
        run: |
          for f in data/output/revenue-priority-products.json data/output/revenue-priority-retailers.json data/output/sponsored-opportunities.json; do
            if [ ! -f "$f" ]; then
              echo "Missing output: $f"
              exit 1
            fi
          done
          echo "All revenue OS outputs present"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: revenue-os-outputs
          path: |
            data/output/revenue-priority-products.json
            data/output/revenue-priority-retailers.json
            data/output/sponsored-opportunities.json
          retention-days: 7
