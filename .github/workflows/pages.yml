name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: 'true'

      - name: Verify build paths
        run: |
          # Ensure dist/index.html exists
          test -f dist/index.html || (echo "ERROR: dist/index.html not found" && exit 1)
          # Ensure assets use the /akiprisaye-web/ prefix (not root /)
          if grep -qE 'src="/assets/|href="/assets/|href="/manifest\.webmanifest|src="/icon-|href="/icon-' dist/index.html; then
            echo "ERROR: dist/index.html still contains root-relative /assets/ or /manifest paths"
            grep -E 'src="/|href="/' dist/index.html || true
            exit 1
          fi
          # Ensure the correct subpath prefix is present
          grep -q '/akiprisaye-web/' dist/index.html || (echo "ERROR: /akiprisaye-web/ prefix not found in dist/index.html" && exit 1)
          echo "OK: dist/index.html paths are correctly prefixed with /akiprisaye-web/"

      - name: Verify locale files in dist
        run: |
          for langdir in public/locales/*; do
            if [ -d "$langdir" ]; then
              lang=$(basename "$langdir")
              for f in "$langdir"/*.json; do
                [ -f "$f" ] || continue
                ns=$(basename "$f" .json)
                if [ ! -f "dist/locales/${lang}/${ns}.json" ]; then
                  echo "ERROR: dist/locales/${lang}/${ns}.json not found"
                  exit 1
                fi
              done
            fi
          done
          echo "OK: dist locale *.json files are present for all languages in public/locales"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
