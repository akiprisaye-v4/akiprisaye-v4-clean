name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main, "feat/**", "codex/**"]
  pull_request:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    outputs:
      deployment_url: ${{ steps.deploy_step.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install & Build
        run: |
          cd frontend
          npm install
          npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
      - name: Deploy to Cloudflare Pages
        id: deploy_step
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: akiprisaye-web
          directory: frontend/dist
  validate:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Resolve URL
        run: echo "SITE_URL=${{ needs.deploy.outputs.deployment_url }}" >> $GITHUB_ENV
      - name: Checkout
        uses: actions/checkout@v4
      - name: Preflight (non-blocking)
        run: bash scripts/retry-deployment-validation.sh "$SITE_URL" "Preflight" "non-blocking" 4 20
      - name: Final Validation
        run: bash scripts/retry-deployment-validation.sh "$SITE_URL" "Final check" "blocking" 3 30
