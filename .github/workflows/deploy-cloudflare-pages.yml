name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    outputs:
      deployment_url: ${{ steps.cloudflare_deploy.outputs.deployment-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          VITE_APP_BUILD_ID: ${{ github.sha }}

      - name: Deploy to Cloudflare Pages
        id: cloudflare_deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./frontend/dist --project-name=akiprisaye-web --branch=main

  validate:
    needs: deploy
    if: needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Use the deployment URL from wrangler-action; fall back to the stable production URL.
      SITE_URL: ${{ needs.deploy.outputs.deployment_url || 'https://akiprisaye-web.pages.dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Wait for CDN propagation
        run: sleep 30

      - name: Validation round 1/3
        run: node scripts/validate-deployment.mjs "$SITE_URL"

      - name: Wait before round 2
        run: |
          echo "⏳ Waiting 30s before round 2..."
          sleep 30

      - name: Validation round 2/3
        run: node scripts/validate-deployment.mjs "$SITE_URL"

      - name: Wait before round 3
        run: |
          echo "⏳ Waiting 30s before round 3..."
          sleep 30

      - name: Validation round 3/3
        run: node scripts/validate-deployment.mjs "$SITE_URL"

      - name: Final proof — 3/3 validations passed ✅
        run: |
          echo ""
          echo "🏆 ============================================"
          echo "🏆  PREUVE FINALE — DÉPLOIEMENT 100% VALIDÉ"
          echo "🏆 ============================================"
          echo "✅ Round 1/3 : RÉUSSI"
          echo "✅ Round 2/3 : RÉUSSI"
          echo "✅ Round 3/3 : RÉUSSI"
          echo ""
          echo "🌐 URL      : $SITE_URL"
          echo "🔖 SHA      : ${{ github.sha }}"
          echo "📅 Timestamp: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "🚀 Statut   : 100% VERT — TOUT OK"
