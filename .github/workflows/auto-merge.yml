permissions:
  contents: read

permissions:
  contents: read

name: Auto-merge on CI pass

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    # Only auto-merge non-draft PRs created by the official GitHub Copilot bot
    # or Dependabot.  The previous condition also matched any branch starting
    # with 'copilot/' regardless of who pushed it, which allowed an attacker to
    # create a fork branch named 'copilot/malicious' and trigger auto-merge.
    # We now require the actor to be an official bot identity.
    if: >
      !github.event.pull_request.draft && (
        github.actor == 'copilot[bot]' ||
        github.actor == 'Copilot' ||
        github.actor == 'copilot-swe-agent[bot]' ||
        github.actor == 'github-actions[bot]' ||
        github.actor == 'dependabot[bot]'
      )
    steps:
      - name: Enable auto-merge
        run: gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
