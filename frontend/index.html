<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A KI PRI SA YÉ</title>

  <style>
    body {
      margin: 0;
      background: #0f1115;
      color: #ffffff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .box {
      max-width: 520px;
      padding: 24px;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 12px;
    }

    p {
      opacity: 0.85;
      line-height: 1.5;
    }

    .badge {
      margin-top: 16px;
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: #00a86b;
      color: #000;
      font-weight: 600;
      font-size: 0.85rem;
    }

    /* React container (progressive) */
    #react-root {
      margin-top: 32px;
      display: none;
    }
  </style>
</head>

<body>
  <!-- Fallback statique (TOUJOURS visible) -->
  <div class="box" id="fallback">
    <h1>🟢 A KI PRI SA YÉ</h1>
    <p>
      Le site est en ligne.<br />
      L’infrastructure fonctionne.<br />
      Le chargement React est progressif et sécurisé.
    </p>
    <div class="badge">Cloudflare Pages OK</div>

    <!-- Point d’ancrage React -->
    <div id="react-root"></div>
  </div>

  <!-- Activation logique React -->
  <script>
    window.__REACT_ENABLED__ = true;
  </script>

  <!-- Chargeur React NON BLOQUANT -->
  <script type="module">
    try {
      const reactScript = document.createElement("script");
      reactScript.type = "module";
      reactScript.src = "/react-entry.js";
      reactScript.onload = () => {
        const root = document.getElementById("react-root");
        if (root) {
          root.style.display = "block";
        }
      };
      reactScript.onerror = () => {
        console.warn("React non chargé, fallback actif.");
      };
      document.body.appendChild(reactScript);
    } catch (e) {
      console.warn("Erreur React, fallback conservé.", e);
    }
  </script>
</body>
</html>
