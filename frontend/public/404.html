<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>A KI PRI SA YÉ — Redirection en cours</title>
    <script type="text/javascript">
      // Redirection SPA pour GitHub Pages
      // Target: https://teetee971.github.io/akiprisaye-web/
      var l = window.location;
      l.replace(
        l.protocol + '//' + 'teetee971.github.io/akiprisaye-web' + '/?p=/' +
        l.pathname.split('/').slice(2).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <p>Redirection en cours vers l'application...</p>
  </body>
</html>
