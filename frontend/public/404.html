<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>A KI PRI SA YÉ — Redirection en cours</title>
    <script type="text/javascript">
      // Redirection SPA pour GitHub Pages : redirige vers la racine du dépôt
      var l = window.location;
      var basePath = '/akiprisaye-web';
      var pathname = l.pathname.indexOf(basePath) === 0
        ? l.pathname.slice(basePath.length)
        : l.pathname;
      var path = pathname.slice(1);
      l.replace(
        'https://teetee971.github.io/akiprisaye-web/?p=/' +
        path.replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <p>Redirection en cours vers l'application...</p>
  </body>
</html>
