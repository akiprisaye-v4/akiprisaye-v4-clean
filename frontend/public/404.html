<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>A KI PRI SA YÉ – Transparence des prix Outre-mer</title>
    <meta name="description" content="Comparez les prix en Guadeloupe, Martinique, Guyane, La Réunion et dans tous les territoires d'Outre-mer. Données citoyennes réelles." />
    <link rel="canonical" href="https://teetee971.github.io/akiprisaye-web/" />
    <script>
      // SPA redirect for GitHub Pages — keeps the /akiprisaye-web/ base path
      // Converts /akiprisaye-web/some/deep/path → /akiprisaye-web/?p=%2Fsome%2Fdeep%2Fpath
      (function() {
        var l = window.location;
        var pathSegs = l.pathname.split('/');
        // Segment [0] = '', [1] = 'akiprisaye-web', [2+] = actual route
        var basePath = pathSegs.slice(0, 2).join('/');   // '/akiprisaye-web'
        var routePath = '/' + pathSegs.slice(2).join('/'); // '/comparateurs' etc.
        l.replace(
          l.protocol + '//' + l.host +
          basePath + '/?p=' +
          encodeURIComponent(routePath + l.search) +
          l.hash
        );
      })();
    </script>
    <noscript>
      <meta http-equiv="refresh" content="0; url=https://teetee971.github.io/akiprisaye-web/" />
    </noscript>
  </head>
  <body>
    <p>Redirection en cours… <a href="https://teetee971.github.io/akiprisaye-web/">Cliquez ici si la redirection ne fonctionne pas.</a></p>
  </body>
</html>
